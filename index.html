<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup - Live TV</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b26;
            --accent-color: #00ffaa; /* স্পোর্টস নিয়ন গ্রিন */
            --text-color: #ffffff;
            --secondary-text: #8b949e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: linear-gradient(135deg, #1f1235, #0b0e14);
            padding: 20px 0;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            box-shadow: 0 4px 20px rgba(0, 255, 170, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header h1 span {
            color: var(--accent-color);
        }

        /* প্লেয়ার কন্টেইনার */
        .player-section {
            width: 100%;
            max-width: 800px;
            margin: 20px 0;
            padding: 0 10px;
            box-sizing: border-box;
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #212631;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .playing-now {
            margin-top: 10px;
            font-size: 16px;
            color: var(--accent-color);
            font-weight: bold;
            text-align: center;
        }

        /* চ্যানেল গ্রিড */
        .channel-section {
            width: 100%;
            max-width: 1000px;
            padding: 0 15px;
            box-sizing: border-box;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .channel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .channel-card {
            background-color: var(--card-bg);
            border: 1px solid #212631;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(0, 255, 170, 0.2);
        }

        .channel-logo {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
            border-radius: 8px;
            background-color: #000;
            padding: 5px;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* মোবাইল স্ক্রিনের জন্য অপ্টিমাইজেশন */
        @media (max-width: 600px) {
            header h1 { font-size: 20px; }
            .channel-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
            .channel-card { padding: 10px; }
            .channel-logo { width: 45px; height: 45px; }
            .channel-name { font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>FIFA World Cup <span>Live TV</span></h1>
    </header>

    <div class="player-section">
        <div class="video-wrapper">
            <video id="tvPlayer" controls autoplay muted></video>
        </div>
        <div id="currentChannelName" class="playing-now">চ্যানেল সিলেক্ট করুন</div>
    </div>

    <div class="channel-section">
        <div class="section-title">লাইভ চ্যানেলসমূহ</div>
        <div id="channelGrid" class="channel-grid">
            </div>
    </div>

    <script>
        const video = document.getElementById('tvPlayer');
        const channelGrid = document.getElementById('channelGrid');
        const currentChannelName = document.getElementById('currentChannelName');
        let hls = null;

        // ১. m3u ফাইল লোড এবং পার্স করা
        async function loadM3U() {
            try {
                const response = await fetch('playlist.m3u');
                if (!response.ok) throw new Error('ফাইল পাওয়া যায়নি');
                const text = await response.text();
                parseM3U(text);
            } catch (error) {
                channelGrid.innerHTML = `<p style="color:red; text-align:center; grid-column: 1/-1;">playlist.m3u ফাইলটি লোড করা যায়নি!</p>`;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            let channels = [];
            let currentChannel = null;

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    // চ্যানেল নাম বের করা
                    const nameIndex = line.lastIndexOf(',');
                    if (nameIndex !== -1) {
                        currentChannel.name = line.substring(nameIndex + 1).trim();
                    }
                    // লোগো ইউআরএল বের করা
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    currentChannel.logo = logoMatch ? logoMatch[1] : 'https://placehold.co/100x100/161b26/fff?text=TV';
                } else if (line.startsWith('http') && currentChannel) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = null;
                }
            }
            renderChannels(channels);
        }

        // ২. UI-তে চ্যানেল কার্ড তৈরি করা
        function renderChannels(channels) {
            if (channels.length === 0) {
                channelGrid.innerHTML = `<p style="text-align:center; grid-column: 1/-1;">কোনো চ্যানেল পাওয়া যায়নি।</p>`;
                return;
            }

            channelGrid.innerHTML = '';
            channels.forEach((channel, index) => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `
                    <img class="channel-logo" src="${channel.logo}" alt="${channel.name}" onerror="this.src='https://placehold.co/100x100/161b26/fff?text=TV'">
                    <div class="channel-name">${channel.name}</div>
                `;
                card.onclick = () => playStream(channel.url, channel.name);
                channelGrid.appendChild(card);

                // প্রথম চ্যানেলটি অটোমেটিক প্লে হবে
                if (index === 0) {
                    playStream(channel.url, channel.name);
                }
            });
        }

        // ৩. লাইভ স্ট্রিম প্লে করার ফাংশন (Hls.js ইন্টিগ্রেশন)
        function playStream(url, name) {
            currentChannelName.innerText = "এখন দেখছেন: " + name;

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy(); // আগের স্ট্রিম বন্ধ করা
                }
                hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play();
                });
            } 
            // iOS বা Safari ব্রাউজারের জন্য নেটিভ সাপোর্ট
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    video.play();
                });
            } else {
                alert("আপনার ব্রাউজারে এই লাইভ স্ট্রিমটি সাপোর্ট করছে না।");
            }
        }

        // অ্যাপ চালু হলে m3u লোড হবে
        window.onload = loadM3U;
    </script>
</body>
  </html>
